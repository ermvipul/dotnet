name: Build and Deploy to IIS

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify .NET SDK
        shell: cmd
        run: |
          dotnet --version
          dotnet --info

      - name: Restore Packages
        shell: cmd
        run: dotnet restore

      - name: Build Application
        shell: cmd
        run: dotnet build --configuration Release --no-restore

      - name: Publish Application
        shell: cmd
        run: dotnet publish --configuration Release --output publish

      - name: Take Application Offline
        shell: powershell
        run: |
          $offline = "C:\inetpub\wwwroot\DummyApp\app_offline.htm"
          "Application is being updated. Please try again in a few moments." | Out-File -FilePath $offline -Encoding utf8 -Force
          Start-Sleep -Seconds 5

      - name: Deploy Files
        shell: powershell
        run: |
          Copy-Item ".\publish\*" "C:\inetpub\wwwroot\DummyApp" -Recurse -Force

      - name: Bring Application Online
        if: always()
        shell: powershell
        run: |
          $offline = "C:\inetpub\wwwroot\DummyApp\app_offline.htm"
          if (Test-Path $offline) {
              Remove-Item $offline -Force
          }

      - name: Verify Deployment
        shell: powershell
        run: |
          Get-ChildItem "C:\inetpub\wwwroot\DummyApp"