name: Build and Deploy to IIS

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify .NET SDK
        shell: cmd
        run: |
          dotnet --version
          dotnet --info

      - name: Restore Packages
        shell: cmd
        run: dotnet restore

      - name: Build Application
        shell: cmd
        run: dotnet build --configuration Release --no-restore

      - name: Publish Application
        shell: cmd
        run: dotnet publish --configuration Release --output publish

      - name: Put Application Offline
        shell: powershell
        run: |
          $offline = "C:\inetpub\wwwroot\DummyApp\app_offline.htm"
          "Deployment in progress..." | Out-File $offline -Encoding utf8 -Force
          Start-Sleep -Seconds 3

      - name: Deploy Files
        shell: cmd
        run: |
          robocopy publish C:\inetpub\wwwroot\DummyApp /E /R:2 /W:2
          if %ERRORLEVEL% LEQ 3 exit /b 0
          exit /b %ERRORLEVEL%

      - name: Bring Application Online
        if: always()
        shell: powershell
        run: |
          $offline = "C:\inetpub\wwwroot\DummyApp\app_offline.htm"
          if (Test-Path $offline) {
              Remove-Item $offline -Force
          }

      - name: Start Application Pool
        if: always()
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "DummyAppPool"

      - name: Verify IIS
        shell: powershell
        run: |
          Import-Module WebAdministration
          Get-WebAppPoolState -Name "DummyAppPool"
          Get-Website