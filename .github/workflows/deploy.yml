name: Build and Deploy to IIS

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify .NET SDK
        run: dotnet --info

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --output publish

      - name: Stop IIS App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Stop-WebAppPool -Name "DummyAppPool"

      - name: Deploy
        shell: powershell
        run: |
          Copy-Item ".\publish\*" "C:\inetpub\wwwroot\DummyApp" -Recurse -Force

      - name: Start IIS App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "DummyAppPool"